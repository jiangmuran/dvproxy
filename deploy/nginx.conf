upstream dvproxy_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name dvproxy.jmrai.net;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dvproxy.jmrai.net;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/dvproxy.jmrai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dvproxy.jmrai.net/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Client settings
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # Proxy buffer settings for streaming
    proxy_buffering off;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # Timeouts for long-running requests (AI inference can be slow)
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # Main proxy
    location / {
        proxy_pass http://dvproxy_backend;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # HTTP/1.1 required for keepalive and streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Disable compression to avoid buffering
        proxy_set_header Accept-Encoding "";
        
        # Allow large request/response bodies
        proxy_request_buffering off;
        
        # Timeout overrides
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SSE / Streaming endpoints (extra long timeouts)
    location ~ ^/(v1/(messages|chat/completions|responses))$ {
        proxy_pass http://dvproxy_backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        
        # Critical for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        
        # Very long timeouts for streaming
        proxy_connect_timeout 60s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        
        # Disable gzip for SSE
        gzip off;
    }

    # API documentation
    location /docs {
        proxy_pass http://dvproxy_backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files with caching
    location /static/ {
        proxy_pass http://dvproxy_backend;
        
        proxy_set_header Host $host;
        
        # Cache static assets
        proxy_cache_valid 200 1d;
        expires 7d;
        add_header Cache-Control "public, immutable";
        
        # Enable gzip for static files
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_vary on;
    }

    # WebSocket support (if needed in future)
    location /ws {
        proxy_pass http://dvproxy_backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Health check endpoint (fast)
    location /health {
        proxy_pass http://dvproxy_backend;
        
        proxy_set_header Host $host;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Admin panel - extra security
    location /admin/ {
        proxy_pass http://dvproxy_backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        proxy_buffering off;
    }
}
